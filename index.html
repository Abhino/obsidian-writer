<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0d1513" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Inbox" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Inbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0d1513; --bg-2:#111d1a; --surface:#15211e; --surface-2:#1b2925;
    --line:#25332e; --ink:#e9e6da; --muted:#8a978f; --faint:#5c6863;
    --accent:#e3a857; --accent-dim:#b9863f;
    --ok:#7fb88a; --warn:#d98a6a;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --ui:"Hanken Grotesk",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--ui); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
    /* fill the phone, respect notches */
    min-height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{flex:1; display:flex; flex-direction:column; max-width:680px; width:100%; margin:0 auto; min-height:0}

  /* ── header ───────────────────────────── */
  header{
    display:flex; align-items:baseline; gap:.6rem;
    padding:1.1rem 1.25rem .9rem; border-bottom:1px solid var(--line);
  }
  .mark{font-size:1.18rem; font-weight:700; letter-spacing:-.02em}
  .target{
    font-family:var(--mono); font-size:.72rem; color:var(--faint);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .status{margin-left:auto; display:flex; align-items:center; gap:.45rem; flex:none}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--faint); transition:background .3s}
  .dot.online{background:var(--ok)}
  .dot.offline{background:var(--warn)}
  .status-txt{font-size:.7rem; color:var(--muted); font-variant-numeric:tabular-nums}
  .gear{
    background:none; border:none; color:var(--faint); cursor:pointer;
    padding:.2rem; margin-left:.2rem; display:flex; border-radius:8px;
  }
  .gear:hover{color:var(--muted)}
  .gear:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* ── pinned notes ─────────────────────── */
  .pins{
    display:flex; gap:.5rem; overflow-x:auto; padding:.7rem 1.25rem;
    border-bottom:1px solid var(--line); scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .pins::-webkit-scrollbar{display:none}
  .pins:empty{display:none}
  .chip{
    flex:none; display:inline-flex; align-items:center; gap:.4rem;
    background:var(--surface); border:1px solid var(--line); border-radius:999px;
    color:var(--ink); font-family:var(--ui); font-size:.82rem; font-weight:600;
    padding:.4rem .8rem .4rem .65rem; cursor:pointer; user-select:none;
    -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    transition:transform .1s, border-color .15s; max-width:60vw;
  }
  .chip:active{transform:scale(.96)}
  .chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .chip .obs{color:var(--accent); flex:none; display:flex}
  .chip .lbl{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .chip.editing{border-color:var(--accent-dim); animation:wiggle .35s ease-in-out infinite}
  @keyframes wiggle{0%,100%{transform:rotate(-.6deg)} 50%{transform:rotate(.6deg)}}
  .chip.add{
    background:none; border-style:dashed; color:var(--muted); font-weight:500;
  }
  .chip.add:hover{color:var(--ink); border-color:var(--accent-dim)}

  /* ── stream ───────────────────────────── */
  .stream{
    flex:1; min-height:0; overflow-y:auto; padding:1.1rem 1.25rem .5rem;
    display:flex; flex-direction:column; gap:.7rem; justify-content:flex-end;
  }
  .empty{
    margin:auto 0; text-align:center; color:var(--faint);
    display:flex; flex-direction:column; gap:.5rem; align-items:center; padding:2rem 0;
  }
  .empty .glyph{font-family:var(--mono); font-size:1.6rem; color:var(--accent-dim); opacity:.7}
  .empty p{margin:0; font-size:.92rem; max-width:24ch; line-height:1.5}

  .note{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:.7rem .85rem; animation:settle .34s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes settle{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  .note .text{
    font-family:var(--mono); font-size:.9rem; line-height:1.5; color:var(--ink);
    white-space:pre-wrap; word-break:break-word;
  }
  .note .meta{
    display:flex; align-items:center; gap:.5rem; margin-top:.5rem;
    font-size:.7rem; color:var(--faint); font-variant-numeric:tabular-nums;
  }
  .pill{
    display:inline-flex; align-items:center; gap:.32rem;
    font-size:.66rem; font-weight:600; letter-spacing:.02em; text-transform:lowercase;
  }
  .pill.saving{color:var(--muted)}
  .pill.filed{color:var(--ok)}
  .pill.queued{color:var(--warn)}
  .pill .led{width:5px; height:5px; border-radius:50%; background:currentColor}
  .pill.saving .led{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3} 50%{opacity:1}}
  .retry{
    background:none; border:none; color:var(--warn); cursor:pointer;
    font-family:var(--ui); font-size:.7rem; font-weight:600; padding:0; text-decoration:underline;
  }

  /* ── composer ─────────────────────────── */
  .composer{
    border-top:1px solid var(--line); padding:.85rem 1rem 1rem;
    background:linear-gradient(180deg,transparent,var(--bg-2));
  }
  .field{
    position:relative; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:.2rem .25rem .2rem; transition:border-color .2s;
  }
  .field:focus-within{border-color:var(--accent-dim)}
  textarea{
    width:100%; resize:none; border:none; background:none; color:var(--ink);
    font-family:var(--mono); font-size:1rem; line-height:1.55; padding:.7rem .8rem .2rem;
    max-height:42vh; outline:none; caret-color:var(--accent);
  }
  textarea::placeholder{color:var(--faint)}
  .bar{display:flex; align-items:center; gap:.6rem; padding:.15rem .6rem .35rem .8rem}
  .hint{font-size:.68rem; color:var(--faint); font-family:var(--mono)}
  .send{
    margin-left:auto; display:inline-flex; align-items:center; gap:.4rem;
    background:var(--accent); color:#1a1206; border:none; border-radius:11px;
    font-family:var(--ui); font-weight:700; font-size:.86rem; letter-spacing:-.01em;
    padding:.5rem .9rem; cursor:pointer; transition:transform .1s, opacity .2s;
  }
  .send:active{transform:scale(.97)}
  .send:disabled{opacity:.4; cursor:default}
  .send:focus-visible{outline:2px solid var(--ink); outline-offset:2px}

  /* ── settings sheet ───────────────────── */
  .scrim{
    position:fixed; inset:0; background:rgba(4,8,7,.6); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .22s; z-index:10;
  }
  .scrim.open{opacity:1; pointer-events:auto}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:11;
    background:var(--bg-2); border-top:1px solid var(--line);
    border-radius:20px 20px 0 0; padding:1.1rem 1.25rem calc(1.4rem + env(safe-area-inset-bottom));
    max-width:680px; margin:0 auto;
    transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.7,.3,1);
  }
  .sheet.open{transform:none}
  .sheet h2{margin:.2rem 0 1rem; font-size:1.02rem; font-weight:700; letter-spacing:-.01em}
  .sheet label{display:block; font-size:.74rem; color:var(--muted); margin:.9rem 0 .3rem; font-weight:600}
  .sheet input{
    width:100%; background:var(--surface); border:1px solid var(--line); border-radius:10px;
    color:var(--ink); font-family:var(--mono); font-size:.86rem; padding:.6rem .7rem; outline:none;
  }
  .sheet input:focus{border-color:var(--accent-dim)}
  .row{display:flex; gap:.6rem; align-items:center; margin-top:1.2rem}
  .test{
    background:var(--surface-2); color:var(--ink); border:1px solid var(--line);
    border-radius:10px; font-family:var(--ui); font-weight:600; font-size:.82rem;
    padding:.6rem .9rem; cursor:pointer;
  }
  .save{
    margin-left:auto; background:var(--accent); color:#1a1206; border:none; border-radius:10px;
    font-family:var(--ui); font-weight:700; font-size:.86rem; padding:.6rem 1.1rem; cursor:pointer;
  }
  .test:focus-visible,.save:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .test-result{font-size:.74rem; margin-top:.7rem; font-family:var(--mono); min-height:1em}
  .test-result.ok{color:var(--ok)}
  .test-result.bad{color:var(--warn)}

  /* ── tabs ─────────────────────────────── */
  .tabs{display:flex; gap:.25rem; padding:.45rem 1.25rem 0; border-bottom:1px solid var(--line)}
  .tab{
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-family:var(--ui); font-weight:600; font-size:.85rem;
    padding:.45rem .8rem .55rem; border-bottom:2px solid transparent; margin-bottom:-1px;
    -webkit-tap-highlight-color:transparent;
  }
  .tab.active{color:var(--ink); border-bottom-color:var(--accent)}
  .tab:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* ── today view ───────────────────────── */
  .today{
    flex:1; min-height:0; overflow-y:auto; padding:1rem 1.25rem 1.6rem;
    display:flex; flex-direction:column; gap:.85rem;
  }
  .jobs{display:flex; gap:.5rem; flex-wrap:wrap; align-items:center}
  .job{
    background:var(--surface-2); color:var(--ink); border:1px solid var(--line);
    border-radius:10px; font-family:var(--ui); font-weight:600; font-size:.8rem;
    padding:.5rem .85rem; cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .job:disabled{opacity:.45; cursor:default}
  .job:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .job.icon{margin-left:auto; font-size:1.02rem; padding:.38rem .7rem; line-height:1}

  .job-card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:.75rem .9rem; font-size:.82rem; line-height:1.55;
    animation:settle .3s cubic-bezier(.2,.7,.3,1);
  }
  .job-card .jc-title{font-weight:700; display:flex; align-items:center; gap:.5rem; margin-bottom:.15rem}
  .job-card .jc-title .led{width:6px; height:6px; border-radius:50%; background:var(--muted); flex:none}
  .job-card.running .jc-title .led{background:var(--accent); animation:pulse 1s ease-in-out infinite}
  .job-card.ok .jc-title .led{background:var(--ok)}
  .job-card.bad .jc-title .led{background:var(--warn)}
  .job-card .jc-line{color:var(--muted)}
  .job-card .jc-warn{color:var(--warn)}
  .job-card a{color:var(--accent); text-decoration:none}
  .job-card details{margin-top:.5rem}
  .job-card summary{color:var(--faint); font-size:.72rem; cursor:pointer}
  .job-card pre{
    font-family:var(--mono); font-size:.68rem; color:var(--muted);
    margin:.4rem 0 0; white-space:pre-wrap; word-break:break-word;
  }

  .tv-date{font-family:var(--mono); font-size:.73rem; color:var(--faint)}
  .tv-section{
    font-size:.7rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
    color:var(--faint); margin:.7rem 0 .1rem;
  }
  .task-row{
    display:flex; align-items:flex-start; gap:.6rem; padding:.48rem 0;
    border-bottom:1px solid var(--line); cursor:pointer; user-select:none;
    -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .task-row:last-child{border-bottom:none}
  .task-row .cb{
    flex:none; width:19px; height:19px; border:1.5px solid var(--faint);
    border-radius:6px; margin-top:.12rem; display:flex; align-items:center;
    justify-content:center; color:transparent; transition:background .15s, border-color .15s;
  }
  .task-row.done .cb{background:var(--ok); border-color:var(--ok); color:#10231a}
  .task-row.pending .cb{border-color:var(--accent); animation:pulse 1s ease-in-out infinite}
  .task-row .tx{font-family:var(--mono); font-size:.86rem; line-height:1.5; word-break:break-word}
  .task-row.done .tx{color:var(--faint); text-decoration:line-through}
  .task-row.struct{cursor:default}
  .task-row.struct .cb{visibility:hidden}
  .task-row.struct .tx{color:var(--accent-dim); font-weight:600}
  .badge{
    display:inline-block; font-family:var(--mono); font-size:.62rem; color:var(--accent-dim);
    border:1px solid var(--line); border-radius:6px; padding:0 .3rem; margin-left:.45rem;
    vertical-align:1px;
  }
  .cal-line{
    font-family:var(--mono); font-size:.8rem; color:var(--muted);
    padding:.32rem 0; line-height:1.5; word-break:break-word;
  }
  .quote{
    font-family:var(--mono); font-size:.8rem; color:var(--muted);
    border-left:2px solid var(--accent-dim); padding:.15rem 0 .15rem .6rem; margin:.35rem 0 0;
  }
  .tv-empty{
    margin:2.2rem 0; text-align:center; color:var(--faint);
    display:flex; flex-direction:column; gap:.9rem; align-items:center;
  }
  .tv-empty p{margin:0; font-size:.92rem}
  .toast{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(1.2rem + env(safe-area-inset-bottom));
    background:var(--surface-2); border:1px solid var(--line); color:var(--ink);
    font-size:.8rem; padding:.55rem .95rem; border-radius:10px; z-index:20;
    opacity:0; transition:opacity .2s; pointer-events:none; max-width:88vw; text-align:center;
  }
  .toast.show{opacity:1}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important; transition:none !important}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="mark">inbox</span>
      <span class="target" id="target">00 Inbox.md</span>
      <span class="status">
        <span class="dot" id="dot"></span>
        <span class="status-txt" id="statusTxt">—</span>
      </span>
      <button class="gear" id="gearBtn" aria-label="Settings">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab active" data-view="capture" role="tab">capture</button>
      <button class="tab" data-view="today" role="tab">today</button>
    </nav>

    <div class="pins" id="pins"></div>

    <div class="stream" id="stream"></div>

    <div class="today" id="viewToday" hidden>
      <div class="jobs">
        <button class="job" id="jobDaily">build list</button>
        <button class="job" id="jobTriage">triage</button>
        <button class="job" id="jobResearch">research</button>
        <button class="job icon" id="todayRefresh" aria-label="Refresh">↻</button>
      </div>
      <div class="job-card" id="jobCard" hidden></div>
      <div id="todayBody"></div>
    </div>

    <div class="composer">
      <div class="field">
        <textarea id="input" rows="1" placeholder="write a thought…" autocomplete="off" autocapitalize="sentences"></textarea>
        <div class="bar">
          <span class="hint" id="hint">⌘↵ to capture</span>
          <button class="send" id="sendBtn" disabled>capture
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-label="Settings">
    <h2>Connection</h2>
    <label for="cfgUrl">Backend URL</label>
    <input id="cfgUrl" inputmode="url" placeholder="https://your-service-xxxx.run.app" />
    <label for="cfgToken">Capture token</label>
    <input id="cfgToken" type="password" placeholder="the shared secret your backend expects" />
    <label for="cfgTarget">Target note</label>
    <input id="cfgTarget" placeholder="AutomatedNotes/00 Inbox.md" />
    <label for="cfgVault">Obsidian vault name</label>
    <input id="cfgVault" placeholder="exact vault name, for Open-in-Obsidian" />
    <div class="test-result" id="testResult"></div>
    <div class="row">
      <button class="test" id="testBtn">Test connection</button>
      <button class="save" id="saveBtn">Save</button>
    </div>
  </div>

  <div class="sheet" id="pinSheet" role="dialog" aria-label="Pin a note">
    <h2 id="pinSheetTitle">Pin a note</h2>
    <label for="pinLabel">Button label</label>
    <input id="pinLabel" placeholder="e.g. Goals" />
    <label for="pinFile">Note path from vault root</label>
    <input id="pinFile" placeholder="e.g. Areas/Goals.md" />
    <div class="row">
      <button class="test" id="pinDeleteBtn" style="display:none; color:var(--warn)">Remove</button>
      <button class="save" id="pinSaveBtn">Save pin</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

<script>
(function(){
  "use strict";
  const LS = {
    get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){return d;} },
    set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  };
  const $ = id => document.getElementById(id);

  let cfg = LS.get("inbox.cfg", { url:"", token:"", target:"AutomatedNotes/00 Inbox.md", vault:"" });
  let queue = LS.get("inbox.queue", []);        // captures awaiting the backend
  let pins = LS.get("inbox.pins", []);          // [{id, label, file}]
  let session = [];                              // what we show this session
  let pinEditMode = false;                        // wiggle / tap-to-edit
  let lastOk = null;

  const stream=$("stream"), input=$("input"), sendBtn=$("sendBtn"),
        dot=$("dot"), statusTxt=$("statusTxt"), targetEl=$("target"), pinsEl=$("pins");

  // ── pinned notes ───────────────────────
  function encPath(p){
    // encode each segment, keep slashes as %2F per Obsidian URI rules
    return p.split("/").map(encodeURIComponent).join("%2F");
  }
  function openInObsidian(file){
    if(!cfg.vault){ openSheet(); return; }      // need a vault name first
    const url = "obsidian://open?vault=" + encodeURIComponent(cfg.vault) +
                "&file=" + encPath(file.replace(/\.md$/,""));
    // a user-gesture navigation hands the obsidian:// link to the OS
    window.location.href = url;
  }
  function renderPins(){
    pinsEl.innerHTML = "";
    for(const p of pins){
      const chip=document.createElement("button");
      chip.className="chip"+(pinEditMode?" editing":"");
      chip.innerHTML =
        '<span class="obs"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" '+
        'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+
        '<path d="M5 3v16l7-4 7 4V3z"/></svg></span>'+
        '<span class="lbl"></span>';
      chip.querySelector(".lbl").textContent = p.label;
      // tap: open (or edit, if in edit mode); long-press: enter edit + open editor
      let timer=null, longed=false;
      const start=()=>{ longed=false; timer=setTimeout(()=>{ longed=true; openPinSheet(p); }, 500); };
      const cancel=()=>{ if(timer) clearTimeout(timer); };
      chip.addEventListener("pointerdown", start);
      chip.addEventListener("pointerup", cancel);
      chip.addEventListener("pointerleave", cancel);
      chip.addEventListener("click", ()=>{
        if(longed) return;                  // long-press already handled it
        if(pinEditMode) openPinSheet(p);     // edit mode: tap edits
        else openInObsidian(p.file);         // normal: tap opens Obsidian
      });
      pinsEl.append(chip);
    }
    const add=document.createElement("button");
    add.className="chip add";
    add.innerHTML='<span class="obs">+</span><span class="lbl">pin a note</span>';
    add.addEventListener("click", ()=>openPinSheet(null));
    pinsEl.append(add);
  }

  // ── rendering ──────────────────────────
  function fmtTime(ts){
    return new Date(ts).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
  function render(){
    targetEl.textContent = (cfg.target||"00 Inbox.md").split("/").pop();
    if(!session.length){
      stream.innerHTML =
        '<div class="empty"><span class="glyph">⌗</span>'+
        '<p>Nothing captured yet. Write a thought and it lands in your inbox.</p></div>';
      return;
    }
    stream.innerHTML = "";
    for(const n of session){
      const el=document.createElement("div"); el.className="note";
      const t=document.createElement("div"); t.className="text"; t.textContent=n.text;
      const m=document.createElement("div"); m.className="meta";
      const time=document.createElement("span"); time.textContent=fmtTime(n.ts);
      const pill=document.createElement("span"); pill.className="pill "+n.status;
      const label={saving:"saving",filed:"filed",queued:"queued"}[n.status]||n.status;
      pill.innerHTML='<span class="led"></span>'+label;
      m.append(time, pill);
      if(n.status==="queued"){
        const r=document.createElement("button"); r.className="retry"; r.textContent="retry";
        r.onclick=()=>flush(true); m.append(r);
      }
      el.append(t,m); stream.append(el);
    }
    stream.scrollTop = stream.scrollHeight;
  }

  function setConn(state){ // "online" | "offline" | null
    dot.className="dot"+(state?" "+state:"");
    if(state==="online") statusTxt.textContent = queue.length? queue.length+" queued" : "synced";
    else if(state==="offline") statusTxt.textContent = queue.length? queue.length+" queued" : "offline";
    else statusTxt.textContent = "—";
  }

  // ── capture flow ───────────────────────
  function capture(){
    const text=input.value.trim();
    if(!text) return;
    const item={ id:Date.now()+""+Math.random().toString(36).slice(2,6), text, ts:Date.now(), status:"saving" };
    session.push(item);
    input.value=""; autosize(); sendBtn.disabled=true; render();
    send(item);
  }

  async function send(item){
    if(!cfg.url){ markQueued(item); openSheet(); return; }
    try{
      const res=await fetch(cfg.url.replace(/\/+$/,"")+"/capture",{
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(cfg.token||"") },
        body:JSON.stringify({ text:item.text, ts:new Date(item.ts).toISOString(), target:cfg.target })
      });
      if(!res.ok) throw new Error("HTTP "+res.status);
      item.status="filed"; lastOk=Date.now(); setConn("online"); render();
    }catch(e){
      markQueued(item);
    }
  }

  function markQueued(item){
    item.status="queued";
    if(!queue.find(q=>q.id===item.id)) queue.push({id:item.id, text:item.text, ts:item.ts});
    LS.set("inbox.queue", queue);
    setConn(navigator.onLine? "online":"offline");
    render();
  }

  // resend everything in the queue; called on load, reconnect, manual retry
  async function flush(force){
    if(!cfg.url || (!navigator.onLine && !force) || !queue.length) return;
    const pending=[...queue];
    for(const q of pending){
      try{
        const res=await fetch(cfg.url.replace(/\/+$/,"")+"/capture",{
          method:"POST",
          headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(cfg.token||"") },
          body:JSON.stringify({ text:q.text, ts:new Date(q.ts).toISOString(), target:cfg.target })
        });
        if(!res.ok) throw new Error("HTTP "+res.status);
        queue=queue.filter(x=>x.id!==q.id);
        LS.set("inbox.queue", queue);
        const s=session.find(x=>x.id===q.id); if(s){ s.status="filed"; }
        lastOk=Date.now();
      }catch(e){ break; } // stop on first failure, keep order
    }
    setConn(navigator.onLine? "online":"offline");
    render();
  }

  // ── composer behaviour ─────────────────
  function autosize(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight, window.innerHeight*0.42)+"px"; }
  input.addEventListener("input",()=>{ autosize(); sendBtn.disabled=!input.value.trim(); });
  input.addEventListener("keydown",e=>{
    if(e.key==="Enter" && (e.metaKey||e.ctrlKey)){ e.preventDefault(); capture(); }
  });
  sendBtn.addEventListener("click",capture);

  // ── settings sheet ─────────────────────
  const scrim=$("scrim"), sheet=$("sheet"), pinSheet=$("pinSheet");
  function openSheet(){
    pinSheet.classList.remove("open");
    $("cfgUrl").value=cfg.url||""; $("cfgToken").value=cfg.token||"";
    $("cfgTarget").value=cfg.target||"AutomatedNotes/00 Inbox.md";
    $("cfgVault").value=cfg.vault||"";
    $("testResult").textContent=""; $("testResult").className="test-result";
    scrim.classList.add("open"); sheet.classList.add("open");
  }
  function closeSheet(){
    scrim.classList.remove("open"); sheet.classList.remove("open"); pinSheet.classList.remove("open");
    if(pinEditMode){ pinEditMode=false; renderPins(); }
  }
  $("gearBtn").addEventListener("click",openSheet);
  scrim.addEventListener("click",closeSheet);
  $("saveBtn").addEventListener("click",()=>{
    cfg={
      url:$("cfgUrl").value.trim(),
      token:$("cfgToken").value,
      target:$("cfgTarget").value.trim()||"AutomatedNotes/00 Inbox.md",
      vault:$("cfgVault").value.trim()
    };
    LS.set("inbox.cfg", cfg); closeSheet(); render(); renderPins(); flush(true);
  });
  $("testBtn").addEventListener("click",async()=>{
    const url=$("cfgUrl").value.trim(); const out=$("testResult");
    if(!url){ out.className="test-result bad"; out.textContent="enter a backend URL first"; return; }
    out.className="test-result"; out.textContent="checking…";
    try{
      const r=await fetch(url.replace(/\/+$/,"")+"/health",{method:"GET"});
      if(r.ok){ out.className="test-result ok"; out.textContent="reachable ✓"; }
      else{ out.className="test-result bad"; out.textContent="responded "+r.status; }
    }catch(e){ out.className="test-result bad"; out.textContent="could not reach service"; }
  });

  // ── pin sheet (add / edit / remove) ────
  let editingPin = null;
  function openPinSheet(pin){
    sheet.classList.remove("open");
    editingPin = pin;
    $("pinSheetTitle").textContent = pin ? "Edit pin" : "Pin a note";
    $("pinLabel").value = pin ? pin.label : "";
    $("pinFile").value  = pin ? pin.file  : "";
    $("pinDeleteBtn").style.display = pin ? "" : "none";
    scrim.classList.add("open"); pinSheet.classList.add("open");
    if(!pin) setTimeout(()=>$("pinLabel").focus(), 80);
  }
  $("pinSaveBtn").addEventListener("click",()=>{
    const label=$("pinLabel").value.trim();
    const file=$("pinFile").value.trim();
    if(!label || !file) return;
    if(editingPin){
      editingPin.label=label; editingPin.file=file;
    }else{
      pins.push({ id:Date.now()+""+Math.random().toString(36).slice(2,5), label, file });
    }
    LS.set("inbox.pins", pins);
    pinEditMode=false; closeSheet(); renderPins();
  });
  $("pinDeleteBtn").addEventListener("click",()=>{
    if(editingPin){ pins=pins.filter(p=>p!==editingPin); LS.set("inbox.pins", pins); }
    pinEditMode=false; closeSheet(); renderPins();
  });

  // ── backend api helper ─────────────────
  function api(path, opts){
    return fetch(cfg.url.replace(/\/+$/,"")+path, Object.assign({
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+(cfg.token||"") }
    }, opts||{}));
  }
  function el(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }

  // ── toast ──────────────────────────────
  const toast=$("toast"); let toastTimer=null;
  function showToast(msg){
    toast.textContent=msg; toast.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove("show"), 2600);
  }

  // ── views: capture ⇄ today ─────────────
  const viewToday=$("viewToday"), todayBody=$("todayBody"),
        composerEl=document.querySelector(".composer");
  let curView="capture", todayData=null, todayFetchedAt=0;
  const TODAY_STALE_MS=60000;

  function switchView(v){
    curView=v;
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.view===v));
    const cap = v==="capture";
    pinsEl.style.display = cap? "" : "none";
    stream.style.display = cap? "" : "none";
    composerEl.style.display = cap? "" : "none";
    viewToday.hidden = cap;
    if(!cap && (!todayData || Date.now()-todayFetchedAt > TODAY_STALE_MS)) fetchToday();
  }
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchView(t.dataset.view)));

  // ── today view ─────────────────────────
  async function fetchToday(){
    if(!cfg.url){ openSheet(); return; }
    todayBody.innerHTML='<div class="tv-empty"><span class="glyph">⌗</span><p>loading today…</p></div>';
    try{
      const r=await api("/today");
      if(!r.ok) throw new Error("HTTP "+r.status);
      todayData=await r.json(); todayFetchedAt=Date.now();
      renderToday();
      lastOk=Date.now(); setConn("online");
    }catch(e){
      todayBody.innerHTML="";
      const box=el("div","tv-empty");
      const p=el("p"); p.textContent="couldn't load today's list";
      const b=el("button","job"); b.textContent="retry"; b.addEventListener("click",fetchToday);
      box.append(p,b); todayBody.append(box);
    }
  }

  function fmtHint(m){
    const h=Math.floor(m/60), r=m%60;
    return "~"+(h&&r? h+"h"+r+"m" : h? h+"h" : r+"m");
  }

  function taskRow(n, depth){
    const row=el("div","task-row"+(n.box? (n.checked?" done":"") : " struct"));
    row.style.paddingLeft=(depth*1.1)+"rem";
    const cb=el("span","cb");
    cb.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    const tx=el("span","tx"); tx.textContent=n.text;
    if(n.hint){ const bd=el("span","badge"); bd.textContent=fmtHint(n.hint); tx.append(bd); }
    row.append(cb,tx);
    if(n.box) row.addEventListener("click",()=>toggleTask(row,n));
    return row;
  }

  function renderToday(){
    todayBody.innerHTML="";
    const d=todayData;
    if(!d) return;
    if(!d.exists){
      const box=el("div","tv-empty");
      const g=el("span","glyph"); g.textContent="⌗";
      const p=el("p"); p.textContent="no list yet for "+d.date;
      const b=el("button","job"); b.textContent="build today's list";
      b.addEventListener("click",()=>runJob("daily"));
      box.append(g,p,b); todayBody.append(box);
      return;
    }
    const dateEl=el("div","tv-date"); dateEl.textContent=d.date+" · "+d.path;
    todayBody.append(dateEl);

    const walk=(nodes,depth)=>{
      for(const n of nodes||[]){
        todayBody.append(taskRow(n,depth));
        walk(n.children,depth+1);
      }
    };
    walk(d.tasks,0);

    const cal=d.calendar;
    if(cal && cal.items && cal.items.length){
      const h=el("div","tv-section"); h.textContent=cal.heading||"Calendar";
      todayBody.append(h);
      for(const it of cal.items){
        if(it.box){
          todayBody.append(taskRow({text:it.line, hint:it.hint, box:true,
                                    checked:it.checked, children:[]}, it.indent?1:0));
        }else{
          const ln=el("div","cal-line");
          ln.style.paddingLeft=(it.indent?1.1:0)+"rem";
          ln.textContent=it.line; todayBody.append(ln);
        }
      }
    }
    for(const q of d.quotes||[]){
      const b=el("div","quote"); b.textContent=q; todayBody.append(b);
    }
  }

  // one flip in flight at a time keeps optimistic state trivially correct
  let toggling=false;
  async function toggleTask(row, n){
    if(toggling) return;
    const want=!n.checked;
    toggling=true;
    row.classList.add("pending"); row.classList.toggle("done", want);
    try{
      const r=await api("/check",{ method:"POST",
        body:JSON.stringify({ date:todayData.date, text:n.text, checked:want }) });
      if(r.status===404){
        showToast("task changed in the vault — refreshing");
        await fetchToday(); return;
      }
      if(!r.ok) throw new Error("HTTP "+r.status);
      todayData=await r.json(); todayFetchedAt=Date.now();
      renderToday();                       // re-render from the server's truth
    }catch(e){
      row.classList.toggle("done", n.checked);   // revert the optimistic flip
      showToast("couldn't update — check connection");
    }finally{
      toggling=false; row.classList.remove("pending");
    }
  }

  // ── jobs: run-and-report ───────────────
  const JOBS={
    daily:    { label:"build list", path:"/daily" },
    triage:   { label:"triage",     path:"/triage" },
    research: { label:"research",   path:"/research" },
  };
  const jobCard=$("jobCard"),
        jobBtns={ daily:$("jobDaily"), triage:$("jobTriage"), research:$("jobResearch") };
  let jobRunning=false, jobTimer=null;

  function setJobsDisabled(dis){
    for(const k in jobBtns) jobBtns[k].disabled=dis;
    $("todayRefresh").disabled=dis;
  }

  async function runJob(name){
    if(jobRunning) return;
    if(!cfg.url){ openSheet(); return; }
    jobRunning=true; setJobsDisabled(true);
    const started=Date.now();
    jobCard.hidden=false; jobCard.className="job-card running";
    jobCard.innerHTML='<div class="jc-title"><span class="led"></span><span id="jcT"></span></div>';
    const tEl=$("jcT");
    const tick=()=>{ tEl.textContent=JOBS[name].label+" running… "+Math.round((Date.now()-started)/1000)+"s"; };
    tick(); jobTimer=setInterval(tick,1000);

    let data=null, err=null;
    try{
      const r=await api(JOBS[name].path,{ method:"POST", body:"{}" });
      data=await r.json().catch(()=>null);
      if(!r.ok) err=(data && data.error) || ("HTTP "+r.status);
      else if(!data) err="empty response";
    }catch(e){ err="network error — the job may still be running on the server"; }
    clearInterval(jobTimer);
    jobRunning=false; setJobsDisabled(false);
    renderJobCard(name, data, err, Math.round((Date.now()-started)/1000));
    if(name==="daily" && !err) fetchToday();     // show what was just built
  }

  function renderJobCard(name, d, err, secs){
    jobCard.hidden=false;
    jobCard.className="job-card "+(err? "bad":"ok");
    jobCard.innerHTML="";
    const title=el("div","jc-title"); title.innerHTML='<span class="led"></span>';
    const tt=el("span"); title.append(tt); jobCard.append(title);
    const line=(txt,cls)=>{ const p=el("div",cls||"jc-line"); p.textContent=txt; jobCard.append(p); };

    if(err){
      tt.textContent=JOBS[name].label+" failed ("+secs+"s)";
      line(String(err),"jc-warn");
    }
    else if(name==="daily"){
      if(d.already){
        tt.textContent="already built for today — no changes";
      }else{
        tt.textContent="built "+d.date+" · "+d.task_count+" tasks ("+secs+"s)";
        line("rolled "+d.rolled_over+" · inbox "+d.from_inbox+"/"+d.inbox_offered
             +" · recurring "+d.recurring_due+" · future "+d.from_future
             +" · projects "+d.from_projects);
        const s=d.selection||{};
        if(s.status){
          const sel="selection "+s.status+" — budget "+s.budget_minutes+"min, hard "
                    +s.hard_cost_minutes+"min, picked "+s.picked+"/"+s.candidates;
          line(sel, /applied/.test(s.status)? "jc-line":"jc-warn");
        }
        if(d.moved_out_of_old_sections)
          line("moved "+d.moved_out_of_old_sections+" item(s) out of old sections");
        if(d.prep_tasks || d.day_tasks)
          line("prep "+(d.prep_tasks||0)+" task(s) on "+(d.prep_events||0)
               +" event(s) · day tasks "+(d.day_tasks||0));
        line("digest: "+(d.digest_status||"—"),
             d.digest_sent? "jc-line":"jc-warn");
        // status strip — anything disabled/failed surfaces in amber
        for(const k of ["prep_status","recurring_status","weather_status"]){
          const v=String(d[k]||"");
          if(/disabled|failed|not found|unparse/i.test(v))
            line(k.replace("_status","")+": "+v, "jc-warn");
        }
        if(d.recurring_unparsed)
          line(d.recurring_unparsed+" recurring line(s) unparseable — check the note","jc-warn");
      }
    }
    else if(name==="triage"){
      tt.textContent="triage: "+d.examined+" examined ("+secs+"s)";
      const routed=Object.entries(d.routed||{}).map(([k,v])=>v+" → "+k).join(" · ");
      line(routed || "nothing routed");
      line("kept as tasks "+d.kept_as_task+" · cleared "+d.cleared);
    }
    else if(name==="research"){
      const done=(d.researched||[]).length;
      tt.textContent="research: "+done+" done of "+d.queued+" queued ("+secs+"s)";
      for(const r of d.researched||[]){
        const row=el("div","jc-line");
        const a=el("a"); a.href="#"; a.textContent="📄 "+r.topic;
        a.addEventListener("click",(e)=>{ e.preventDefault(); openInObsidian(r.note); });
        row.append(a); jobCard.append(row);
      }
      for(const r of d.skipped_fresh||[]) line("fresh, re-linked: "+r.topic);
      for(const f of d.failed||[]) line("failed, left queued: "+f, "jc-warn");
      if(/disabled/.test(d.ntfy||"")) line(d.ntfy,"jc-warn");
    }

    const det=el("details"), sum=el("summary"), pre=el("pre");
    sum.textContent="raw response";
    pre.textContent=JSON.stringify(d,null,2);
    det.append(sum,pre); jobCard.append(det);
  }

  jobBtns.daily.addEventListener("click",()=>runJob("daily"));
  jobBtns.triage.addEventListener("click",()=>runJob("triage"));
  jobBtns.research.addEventListener("click",()=>runJob("research"));
  $("todayRefresh").addEventListener("click",fetchToday);

  // returning to the app with Today open → refresh if stale (e.g. after the
  // morning digest's "Today view" button, or checking boxes in Obsidian)
  document.addEventListener("visibilitychange",()=>{
    if(!document.hidden && curView==="today"
       && Date.now()-todayFetchedAt > TODAY_STALE_MS) fetchToday();
  });

  // ── connectivity ───────────────────────
  window.addEventListener("online",()=>{ setConn("online"); flush(); });
  window.addEventListener("offline",()=>setConn("offline"));

  // ── boot ───────────────────────────────
  // restore queued items into the session view so nothing feels lost
  for(const q of queue){ session.push({id:q.id, text:q.text, ts:q.ts, status:"queued"}); }
  setConn(navigator.onLine? "online":"offline");
  render(); renderPins(); autosize();
  // #today deep link — the morning digest's "Today view" button lands here
  if(location.hash==="#today" && cfg.url) switchView("today");
  if(!cfg.url) setTimeout(openSheet, 350);
  flush();

  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
})();
</script>
</body>
</html>
